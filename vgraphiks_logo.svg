<svg width="1024" height="1024" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <title>V.GRAPHIKS logo</title>
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c2e0"/>
      <stop offset="50%" stop-color="#a8d96a"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#00c2e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="glowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071428"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
    <clipPath id="sq">
      <rect x="120" y="40" width="440" height="480" rx="64"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="120" y="40" width="440" height="480" rx="64" fill="url(#glowBg)"/>
  <rect x="120" y="40" width="440" height="480" rx="64" fill="none" stroke="url(#borderGrad)" stroke-width="1.8"/>

  <g clip-path="url(#sq)" opacity="0.045" stroke="#f5c842" stroke-width="0.8">
    <line x1="120" y1="110" x2="560" y2="110"/>
    <line x1="120" y1="180" x2="560" y2="180"/>
    <line x1="120" y1="250" x2="560" y2="250"/>
    <line x1="120" y1="320" x2="560" y2="320"/>
    <line x1="120" y1="390" x2="560" y2="390"/>
    <line x1="120" y1="460" x2="560" y2="460"/>
    <line x1="190" y1="40" x2="190" y2="520"/>
    <line x1="260" y1="40" x2="260" y2="520"/>
    <line x1="340" y1="40" x2="340" y2="520"/>
    <line x1="420" y1="40" x2="420" y2="520"/>
    <line x1="490" y1="40" x2="490" y2="520"/>
  </g>

  <ellipse cx="340" cy="255" rx="110" ry="130" fill="#f5c842" opacity="0.08" filter="url(#glow)" clip-path="url(#sq)"/>

  <polygon points="143,100 200,100 340,380 278,380" fill="url(#vGrad)" clip-path="url(#sq)"/>
  <polygon points="537,100 480,100 340,380 402,380" fill="url(#vGrad)" clip-path="url(#sq)"/>

  <polyline points="158,104 340,362 522,104" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.09" clip-path="url(#sq)"/>

  <rect x="143" y="100" width="57" height="4" rx="2" fill="#00c2e0" opacity="1" clip-path="url(#sq)"/>
  <rect x="480" y="100" width="57" height="4" rx="2" fill="#f5c842" opacity="1" clip-path="url(#sq)"/>

  <circle cx="340" cy="383" r="6" fill="#f5c842" opacity="0.7" clip-path="url(#sq)"/>
  <circle cx="340" cy="383" r="15" fill="#f5c842" opacity="0.15" clip-path="url(#sq)"/>

  <line x1="145" y1="403" x2="535" y2="403" stroke="url(#vGrad)" stroke-width="1" opacity="0.22" clip-path="url(#sq)"/>

  <text x="340" y="462" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="44" font-weight="700"
    textLength="370" lengthAdjust="spacing"
    fill="#f5c842" clip-path="url(#sq)">V.GRAPHIKS</text>

  <line x1="148" y1="478" x2="532" y2="478" stroke="url(#vGrad)" stroke-width="1.5" opacity="0.5" clip-path="url(#sq)"/>

  <circle cx="130" cy="50" r="3" fill="#00c2e0" opacity="0.4"/>
  <circle cx="550" cy="50" r="3" fill="#f5c842" opacity="0.4"/>
  <circle cx="130" cy="510" r="3" fill="#f5c842" opacity="0.4"/>
  <circle cx="550" cy="510" r="3" fill="#00c2e0" opacity="0.4"/>
</svg>
